name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Format + Lint + Check
# ─────────────────────────────────────────────────────────────────────────────
  lint-and-check:
    name: Lint & Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Public boundary check
        run: ./scripts/ci/no-private-deps.sh

      - name: Cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Unit Tests (public crates)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: |
          cargo test \
            -p laplace-interfaces \
            -p laplace-macro \
            -p laplace-probe-common \
            -p laplace-probe-sdk \
            -p laplace-dpor \
            -p laplace-sdk

      # Adopter first-mile gate: the generated `#[verify]` harness + hand-written
      # capture examples must run to completion. This is a HARD gate (no
      # continue-on-error): it deterministically reproduced the capture-session
      # hang regression, so a re-introduction fails CI instead of hanging unseen.
      - name: Adopter gate (integration-test capture session)
        run: cargo test -p integration-test
        timeout-minutes: 5

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Bug-Detection Hunt Examples (patched vendor 사용)
# ─────────────────────────────────────────────────────────────────────────────
  hunt-examples:
    name: Bug Detection Hunt Examples
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: crossbeam-hunt
        run: |
          cargo test --manifest-path examples/crossbeam-hunt/Cargo.toml
        continue-on-error: true

      - name: dashmap-hunt
        run: |
          cargo test --manifest-path examples/dashmap-hunt/Cargo.toml
        continue-on-error: true

      - name: parking_lot-hunt
        run: |
          cargo test --manifest-path examples/parking_lot-hunt/Cargo.toml
        continue-on-error: true

      - name: rayon-hunt
        run: |
          cargo test --manifest-path examples/rayon-hunt/Cargo.toml
        continue-on-error: true
