name: Supply Chain Security

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout laplace-cloud repo
        uses: actions/checkout@v4
        with:
          repository: laplace-labs-inc/laplace-cloud
          path: laplace-cloud
          token: ${{ secrets.LAPLACE_CI_READ_TOKEN }}
          fetch-depth: 1

      - name: Link laplace-cloud sibling path
        run: |
          rm -rf "${{ github.workspace }}/../laplace-cloud"
          mv "${{ github.workspace }}/laplace-cloud" "${{ github.workspace }}/../laplace-cloud"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Run cargo audit
        run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout laplace-cloud repo
        uses: actions/checkout@v4
        with:
          repository: laplace-labs-inc/laplace-cloud
          path: laplace-cloud
          token: ${{ secrets.LAPLACE_CI_READ_TOKEN }}
          fetch-depth: 1

      - name: Link laplace-cloud sibling path
        run: |
          rm -rf "${{ github.workspace }}/../laplace-cloud"
          mv "${{ github.workspace }}/laplace-cloud" "${{ github.workspace }}/../laplace-cloud"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.7
      - name: Run cargo deny
        run: cargo deny --manifest-path ./Cargo.toml --all-features check
