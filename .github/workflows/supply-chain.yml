name: Supply Chain Security

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Public boundary check
        run: ./scripts/ci/no-private-deps.sh
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Run cargo audit
        run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Public boundary check
        run: ./scripts/ci/no-private-deps.sh
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.7
      - name: Run cargo deny
        run: cargo deny --manifest-path ./Cargo.toml --all-features check
