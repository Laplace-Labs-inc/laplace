[advisories]
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Elastic-2.0",
]
# Workspace-internal example/fixture crates (publish = false) carry no SPDX
# license field; they are never published, so their license is not a supply-chain
# concern. Ignore them rather than annotating each (bb8-hunt, byoc-demo,
# deadpool-hunt, integration-test, known-bug-hunt, mobc-hunt, mobc-real, r2d2-hunt).
private = { ignore = true }

[bans]
multiple-versions = "warn"
